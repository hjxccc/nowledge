<!doctype html>
<!-- nowledge 发现类榜单卡片模板。占位：{{TITLE}} {{ASOF}} {{SUBTITLE}} {{ROWS}} -->
<html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root{--bg:#0b0e14;--card:#141a24;--line:#232c3a;--ink:#e6edf3;--dim:#8b98a9;
        --accent:#f0b429;--accent2:#4fd1c5;--rankbg:#1c2532}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,"Segoe UI",
       "Microsoft YaHei",Roboto,sans-serif;padding:32px;display:flex;justify-content:center}
  .wrap{width:760px;max-width:100%}
  .head{display:flex;align-items:baseline;justify-content:space-between;
        border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:6px}
  h1{font-size:22px;font-weight:700;letter-spacing:.2px}
  h1 .spark{color:var(--accent)}
  .asof{font-size:12px;color:var(--dim);white-space:nowrap}
  .sub{font-size:12.5px;color:var(--dim);margin:8px 0 18px}
  .row{display:flex;gap:14px;align-items:flex-start;padding:14px 0;
       border-bottom:1px solid var(--line)}
  .rank{flex:0 0 34px;height:34px;border-radius:9px;background:var(--rankbg);
        color:var(--accent);font-weight:700;font-size:16px;display:flex;
        align-items:center;justify-content:center}
  .row:first-child .rank{background:var(--accent);color:#0b0e14}
  .body{flex:1;min-width:0}
  .name{font-size:16px;font-weight:600}
  .name a{color:var(--ink);text-decoration:none}
  .name a:hover{color:var(--accent2)}
  .desc{color:var(--dim);font-size:13.5px;margin-top:3px}
  .meta{display:flex;gap:10px;margin-top:7px;font-size:12px;flex-wrap:wrap}
  .tag{background:#1a2230;border:1px solid var(--line);color:var(--dim);
       padding:1px 8px;border-radius:20px}
  .star{color:var(--accent);font-weight:600}
  .foot{margin-top:16px;font-size:11.5px;color:var(--dim);line-height:1.7}
  .foot b{color:var(--accent2)}
</style></head>
<body><div class="wrap">
  <div class="head"><h1><span class="spark">▲</span> {{TITLE}}</h1>
       <span class="asof">as-of {{ASOF}}</span></div>
  <div class="sub">{{SUBTITLE}}</div>
  {{ROWS}}
  <div class="foot">{{FOOT}}</div>
</div></body></html>
